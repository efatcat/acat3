<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Angry Cat — погоня с шипами и скинами</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a0710;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Unbounded', cursive;
        }
        .splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.6s ease-out, visibility 0.6s ease-out;
            opacity: 1;
            visibility: visible;
        }
        .splash-svg {
            display: block;
            width: auto;
            max-width: 92vw;
            max-height: 92vh;
            filter: drop-shadow(0 0 12px rgba(255,40,40,0.5));
            animation: fadeScale 0.65s ease-out;
        }
        @keyframes fadeScale {
            0% { opacity: 0.6; transform: scale(0.96); }
            100% { opacity: 1; transform: scale(1); }
        }
        .splash.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .game-menu {
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 30% 20%, #1a1427, #0a0710);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .menu-container {
            text-align: center;
            max-width: 480px;
            width: 85%;
            background: rgba(10,7,18,0.65);
            backdrop-filter: blur(14px);
            border-radius: 64px;
            padding: 2rem 1.5rem;
            border: 1px solid rgba(255,90,70,0.4);
            box-shadow: 0 20px 35px rgba(0,0,0,0.6);
        }
        .game-logo {
            font-size: clamp(2rem, 7vw, 3.6rem);
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #ff7a55, #ff3a1a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 2rem;
        }
        .menu-btn {
            display: block;
            width: 90%;
            margin: 0.9rem auto;
            background: rgba(0,0,0,0.7);
            border: 1.5px solid #ff4c2c;
            border-radius: 60px;
            padding: 0.8rem;
            font-family: 'Unbounded', cursive;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: #ffe0d4;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }
        .menu-btn:hover {
            background: #ff3a2c;
            color: #0a0710;
            border-color: #ffaa88;
            transform: scale(1.02);
        }
        .overlay-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8,5,14,0.96);
            backdrop-filter: blur(20px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: panelFade 0.2s ease;
        }
        @keyframes panelFade {
            from { opacity: 0; backdrop-filter: blur(0); }
            to { opacity: 1; backdrop-filter: blur(20px); }
        }
        .panel-card {
            background: #15101f;
            border-radius: 48px;
            padding: 2rem;
            max-width: 550px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid #ff5e3e;
            text-align: center;
        }
        .panel-card h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ff7a55;
            margin-bottom: 1.5rem;
        }
        .credit-text {
            font-size: 1rem;
            line-height: 1.6;
            color: #f0cfc0;
            margin: 1rem 0;
        }
        .skin-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin: 1rem 0;
        }
        .skin-option {
            background: #241f30;
            padding: 0.8rem 1rem;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #ff5e3e;
            color: #ffd9cf;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .skin-option:hover {
            background: #ff4c2c;
            color: #0d0712;
            transform: scale(1.01);
        }
        .skin-option.selected {
            background: #ff4c2c;
            color: #0d0712;
            border-color: #ffdd99;
            box-shadow: 0 0 10px #ff7a55;
        }
        .promo-input {
            display: flex;
            gap: 10px;
            margin: 1rem 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        .promo-input input {
            padding: 0.8rem 1rem;
            border-radius: 60px;
            border: 1px solid #ff5e3e;
            background: #2a1f33;
            color: white;
            font-family: 'Unbounded', cursive;
            font-size: 0.9rem;
            flex: 1;
            min-width: 180px;
        }
        .promo-input button {
            background: #ff4c2c;
            border: none;
            border-radius: 60px;
            padding: 0.8rem 1.5rem;
            font-family: 'Unbounded', cursive;
            font-weight: 600;
            cursor: pointer;
            color: #0d0712;
        }
        .back-btn {
            background: #2a1f33;
            border: none;
            color: #ffaa8a;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-family: 'Unbounded', cursive;
            font-weight: 600;
            margin-top: 1.5rem;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .game-area {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            background: #1e2a2a;
            background-image: radial-gradient(circle at 10% 20%, #2d3e3e 1%, transparent 1%);
            background-size: 40px 40px;
            position: relative;
        }
        canvas {
            display: block;
            background: #d9e6b3;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 95vw;
            max-height: 85vh;
            width: auto;
            height: auto;
        }
        .gameover-animation {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Unbounded', cursive;
            font-size: 3rem;
            font-weight: 900;
            color: #ff3a1a;
            text-shadow: 0 0 20px #ff0000, 0 0 10px #aa2e2e;
            background: rgba(0,0,0,0.7);
            padding: 1rem 2rem;
            border-radius: 60px;
            white-space: nowrap;
            z-index: 1000;
            animation: gameoverPulse 1.5s ease-out forwards;
            pointer-events: none;
        }
        @keyframes gameoverPulse {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); visibility: hidden; }
        }
        .loading-text {
            color: #ffaa88;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

<div id="splashScreen" class="splash">
    <svg class="splash-svg" version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0,0,502,378.87688">
        <g transform="translate(11,9.43844)">
            <path d="M-10,368.43844v-376.87688h500v376.87688z" fill="#000000" stroke="#000000" stroke-width="2"/>
            <g fill="none" stroke="#ff0000" stroke-width="10" stroke-linecap="round">
                <path d="M84.47476,155.28001c0,0 9.35897,-61.09018 23.55498,-76.57673c12.46181,-13.5947 57.09823,-11.40858 57.09823,-11.40858l-1.22202,84.31926"/>

                <path d="M299.54997,151.43938l7.39321,-63.37037l22.17963,17.95494"/>
                <path d="M353.31877,85.62497l-7.33211,65.98898l54.99082,-51.32477l-67.211,144.19815"/>

    </svg>
</div>

<div id="mainMenu" class="game-menu" style="display: none;">
    <div class="menu-container">
        <div class="game-logo">ANGRY CAT</div>
        <button class="menu-btn" id="playBtn">▶ PLAY</button>
        <button class="menu-btn" id="skinsBtn">🎨 SKINS</button>
        <button class="menu-btn" id="promoBtn">🎁 ПРОМОКОДЫ</button>
        <button class="menu-btn" id="creditsBtn">📜 CREDITS</button>
    </div>
</div>

<div id="gameArea" class="game-area">
    <canvas id="gameCanvas" width="900" height="600"></canvas>
</div>

<script>
    (function() {
        // ---------- ЗАСТАВКА ----------
        const splashDiv = document.getElementById('splashScreen');
        const mainMenuDiv = document.getElementById('mainMenu');
        let splashHidden = false;
        function hideSplashAndShowMenu() {
            if (splashHidden) return;
            splashHidden = true;
            splashDiv.classList.add('hide');
            setTimeout(() => {
                if (splashDiv.parentNode) splashDiv.parentNode.removeChild(splashDiv);
                mainMenuDiv.style.display = 'flex';
            }, 600);
        }
        setTimeout(hideSplashAndShowMenu, 1000);

        // ---------- МУЗЫКА ----------
        let bgMusic = null;
        let musicAllowed = false;
        function initMusic() {
            bgMusic = new Audio('acat-sound.mp3');
            bgMusic.loop = true;
            bgMusic.volume = 0.5;
            bgMusic.addEventListener('error', () => console.warn('Музыка не загружена, проверьте файл acat-sound.mp3'));
        }
        initMusic();
        function playMusic() { if (bgMusic && musicAllowed) bgMusic.play().catch(e => console.warn("audio blocked")); }
        function stopMusic() { if (bgMusic) { bgMusic.pause(); bgMusic.currentTime = 0; } }

        // ---------- СКИНЫ (ЗАГРУЗКА ИЗ ФАЙЛОВ) ----------
        // Список доступных скинов с путями к файлам
        const skinFiles = [
            { name: "Classic Cat", file: "classic.svg", emoji: "🐱", id: "classic" },
            { name: "Scarf Cat", file: "scarfcat.svg", emoji: "🧣", id: "scarf" },
            { name: "Rgb Cat", file: "rgbcat.svg", emoji: "🌈", id: "rgb" },
            { name: "Crazy Cat", file: "crazycat.svg", emoji: "🌀", id: "crazy" },
            { name: "Zelen Cat", file: "zelencat.svg", emoji: "🌿", id: "zelen" }
        ];
        
        // Секретный скин по промокоду
        let goldenSkinUnlocked = false;
        let goldenSkinImg = null;
        
        let currentSkinIndex = 0; // 0 = classic
        let currentPlayerImg = null;
        let enemyImg = null;
        
        // Кэш загруженных изображений
        let skinImages = {};
        
        function loadImageFromFile(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error(`Failed to load ${url}`));
                img.src = url;
            });
        }
        
        async function loadAllSkins() {
            // Загружаем все основные скины
            for (const skin of skinFiles) {
                try {
                    const img = await loadImageFromFile(skin.file);
                    skinImages[skin.id] = img;
                    console.log(`Loaded skin: ${skin.name}`);
                } catch (e) {
                    console.warn(`Failed to load ${skin.file}, using fallback`);
                    // Создаём цветной квадрат как fallback
                    const fallbackImg = document.createElement('canvas');
                    fallbackImg.width = 90;
                    fallbackImg.height = 96;
                    const ctx = fallbackImg.getContext('2d');
                    ctx.fillStyle = '#FFAB19';
                    ctx.fillRect(0, 0, 90, 96);
                    ctx.fillStyle = '#001026';
                    ctx.font = 'bold 20px monospace';
                    ctx.fillText('🐱', 30, 50);
                    skinImages[skin.id] = fallbackImg;
                }
            }
            // Загружаем золотой скин
            try {
                goldenSkinImg = await loadImageFromFile('golden22.svg');
                console.log('Loaded golden skin');
            } catch (e) {
                console.warn('Golden skin not found, will create fallback');
                const fallback = document.createElement('canvas');
                fallback.width = 90;
                fallback.height = 96;
                const ctx = fallback.getContext('2d');
                ctx.fillStyle = '#FFD700';
                ctx.fillRect(0, 0, 90, 96);
                ctx.fillStyle = '#B8860B';
                ctx.font = 'bold 20px monospace';
                ctx.fillText('⭐', 35, 50);
                goldenSkinImg = fallback;
            }
            
            // Устанавливаем текущий скин
            currentPlayerImg = skinImages[skinFiles[currentSkinIndex].id];
        }
        
        async function updatePlayerSkin() {
            if (goldenSkinUnlocked) {
                currentPlayerImg = goldenSkinImg;
            } else {
                currentPlayerImg = skinImages[skinFiles[currentSkinIndex].id];
            }
        }
        
        // Загрузка врага (Angry Cat)
        async function loadEnemy() {
            // Врага тоже можно загрузить из файла, но оставим встроенный SVG
            const enemySVG = `<svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="95.17898" height="98.4749" viewBox="0,0,95.17898,98.4749"><g transform="translate(-192.32102,-131.86666)"><g stroke-miterlimit="10"><path d="M256.53334,155.46666v-23h20.66667v23z" fill="#ffeb00" stroke="#001026" stroke-width="1.2"/><path d="M208.53334,149.46666v-17h22.66667v17z" fill="#ffeb00" stroke="#001026" stroke-width="1.2"/><path d="M281.53334,163.13333c0,-14.91169 -17.83399,-27 -39.83333,-27c-21.99934,0 -39.83333,12.08831 -39.83333,27c0,14.91169 17.83399,27 39.83333,27c21.99934,0 39.83333,-12.08831 39.83333,-27z" fill="#ffeb00" stroke="#001026" stroke-width="1.2"/><g><path d="M224.7,201.1c0.8,0.4 2.5,1.3 0.1,4.7c-2.4,3.4 -9.3,4.1 -10.1,4.1c-3.1,0.1 -6.9,0.1 -11.1,-1.3c-12.2,-4 -12.3,-17.1 -8.4,-19.2c3.8,-2.1 5.5,6 11,10.9c2.4,2.2 5.3,3 7.7,3.5c3.4,0.6 9.9,-3.2 10.8,-2.7z" fill="#ffeb00" stroke="#001026" stroke-width="1.2"/><path d="M199.9,193c1.6,2.7 4.7,6.5 4.7,6.5c0,0 -3.7,-0.9 -5.8,0.8c-1.7,1.3 -1.3,3.5 -1.1,4.2c-1.3,-1.3 -2.9,-3.1 -3.9,-6.6c-1,-3.5 0,-7.7 2,-8.3c2,-0.4 2.5,1.1 4.1,3.4z" fill="#a9a9a9" stroke="none"/></g><path d="M229.7,211.5c-1.8,1.2 -8,5.6 -15.9,8.1l-0.4,0.1c-0.4,0.1 -0.6,0.6 -0.4,1c1.7,2.4 4.8,7.2 -0.7,8.9c-5.3,1.7 -15.2,-12.4 -11,-16.1c1.9,-1.4 3.6,-0.7 4.5,-0.3c0.5,0.2 1,0.2 1.5,0.1c1.2,-0.4 3.4,-1.2 5.1,-2.1c4.3,-2.2 5.3,-3.1 7.3,-4.6c2,-1.5 6.6,-5.2 10.3,-2c3.2,2.7 1.4,5.7 -0.3,6.9z" fill="#ffeb00" stroke="#001026" stroke-width="1.2"/><path d="M245.6,190.7c0.5,0.4 6.6,7.6 8.6,5.8c2.4,-2.1 5.7,-6.2 9.3,-2.9c3.6,3.3 -3.2,8.9 -6.1,10.4c-6.9,3.1 -12.5,-2.8 -13.7,-4.4c-1.2,-1.6 -3.3,-4.3 -3.3,-6.9c0.1,-2.8 3.5,-3.5 5.2,-2z" fill="#ffeb00" stroke="#001026" stroke-width="1.2"/><g><path d="M245.7,214c2.1,1.9 6.7,5.8 6.7,5.8c0,0 14.3,-2.5 14.3,4.7c0,4.3 -7.2,5.3 -16.9,4.4c-0.6,-0.1 -1.2,-0.3 -1.7,-0.7c-2.2,-1.9 -8.5,-7.5 -12.5,-11.4c-5.9,-5.8 -10.8,-9.6 -10.8,-9.6c-8.5,-8.3 -1.6,-11.8 1.1,-16.6c2.5,-4.1 3.6,-3.3 9.6,-2.1c3.4,0.5 5.4,0.8 7.6,0.7c3.3,-0.1 2.7,4.7 1.8,7.2c0,0 -1.4,3.7 -2.7,5.6c-1.6,2.3 -2.8,3.8 -4,4.7z" fill="#ffeb00" stroke="#001026" stroke-width="1.2"/><path d="M237.3,206.6c0,0 -1.5,-1.2 -3.1,-2.7c-2,-1.8 -4,-3.3 -2,-6.4c1.8,-2.4 3.5,-5.6 8,-2.7c4.3,2.7 2.4,5.2 2.4,5.2c-2.2,4.5 -5.3,6.6 -5.3,6.6z" fill="#a9a9a9" stroke="none"/></g><path d="M222.2,198.4c2.2,2.8 5.6,6.3 1.3,9.2c-5.9,3.3 -10.8,-6.7 -11.8,-10.2c-0.9,-3.1 1.7,-5.1 3.9,-6.8c4.3,-3.1 7.9,-5.9 11.9,-4.4c5,1.8 1.4,5.8 -1.1,7.6c-1.5,1.1 -3,2.3 -4.1,3c-0.3,0.5 -0.4,1.1 -0.1,1.6z" fill="#ffeb00" stroke="#001026" stroke-width="1.2"/><path d="M268.5,160.4c0,0 6.9,1.8 8.1,7.5c1.2,5.7 -3.6,16 -22.2,19.6c-24.2,5 -35.7,-9.4 -29,-20c6.7,-10.7 18.2,-1.6 26.6,-2.2c7.2,-0.5 8,-6.8 16.5,-4.9z" fill="#a9a9a9" stroke="none"/><path d="M246.7,170.51464c10.5,-0.6 14.3,6.9 15.2,9.6c0.2,0.5 -0.2,1 -0.7,0.9c-1.5,-0.3 -4.7,-0.6 -10.1,-0.3c-6,0.4 -11.4,2 -13.3,2.7c-0.4,0.1 -0.8,-0.2 -0.8,-0.6c-0.3,-4.9 0.6,-11.3 9.7,-12.3z" fill="#ff0000" stroke="#001026" stroke-width="1.2"/><path d="M286.9,161.5c-4.7,3.8 -11.9,3.9 -11.9,3.9" fill="none" stroke="#001026" stroke-width="1.2"/><path d="M285.6,172.7c-6.3,0.5 -10.2,-1.4 -10.2,-1.4" fill="none" stroke="#001026" stroke-width="1.2"/><path d="M251.6,162.7c2.1,0 4.3,0.2 4.4,0.9c0.1,1.4 -1.4,4.2 -3,4.3c-1.8,0.2 -6,-2.3 -6,-3.9c-0.1,-1.2 2.6,-1.3 4.6,-1.3z" fill="#001026" stroke="#001026" stroke-width="1.2"/><path d="M206.6,161.2c0,0 8.6,2.8 12.1,5.9" fill="none" stroke="#001026" stroke-width="1.2"/><path d="M219,170.6c-4.3,1.7 -11.7,0.6 -11.7,0.6" fill="none" stroke="#001026" stroke-width="1.2"/><g><path d="M263.4,151c2.9,4.5 3,9.6 0.2,11.4c-2.8,1.8 -7.4,-0.3 -10.4,-4.8c-2.9,-4.5 -3,-9.6 -0.2,-11.4c2.8,-1.9 7.5,0.3 10.4,4.8z" fill="#ff0000" stroke="#001026" stroke-width="1.2"/><path d="M263,156.7c0,1.1 -0.8,2 -1.8,2c-1,0 -1.8,-0.9 -1.8,-2c0,-1.1 0.8,-2 1.8,-2c1,0 1.8,0.9 1.8,2" fill="#001026" stroke="none"/></g><g><path d="M238.6,153.8c3,4.4 2.8,9.8 0.1,11.7c-3.3,1.9 -7.7,0.5 -10.7,-3.9c-3.1,-4.4 -3.3,-10.1 -0.2,-12.3c3.1,-2.3 7.8,0.1 10.8,4.5z" fill="#ff0000" stroke="#001026" stroke-width="1.2"/><path d="M238,159.6c0,1.1 -0.8,2 -1.8,2c-1,0 -1.8,-0.9 -1.8,-2c0,-1.1 0.8,-2 1.8,-2c1,0.1 1.8,0.9 1.8,2" fill="#001026" stroke="none"/></g></g></g></svg>`;
            const img = new Image();
            const blob = new Blob([enemySVG], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            return new Promise((resolve) => {
                img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
                img.src = url;
            });
        }

        // ---------- ИГРОВЫЕ ПЕРЕМЕННЫЕ ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameAreaDiv = document.getElementById('gameArea');
        let animationId = null;
        let gameRunning = false;
        let gameOverFlag = false;

        let player = { x: 450, y: 300, radius: 28, lastDir: 'right' };
        let enemy = { x: 100, y: 100, radius: 30, speed: 4.2, lastDir: 'right' };
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        let playerSpeed = 5.5;
        let spikes = [];
        let spikeInterval = null;

        function handleKeyDown(e) {
            if (keys.hasOwnProperty(e.key)) {
                keys[e.key] = true;
                e.preventDefault();
                if (e.key === 'ArrowLeft') player.lastDir = 'left';
                if (e.key === 'ArrowRight') player.lastDir = 'right';
            }
        }
        function handleKeyUp(e) {
            if (keys.hasOwnProperty(e.key)) { keys[e.key] = false; e.preventDefault(); }
        }

        function updatePlayerPosition() {
            let newX = player.x, newY = player.y;
            if (keys.ArrowLeft) { newX -= playerSpeed; player.lastDir = 'left'; }
            if (keys.ArrowRight) { newX += playerSpeed; player.lastDir = 'right'; }
            if (keys.ArrowUp) newY -= playerSpeed;
            if (keys.ArrowDown) newY += playerSpeed;
            player.x = Math.min(Math.max(newX, 30), canvas.width - 30);
            player.y = Math.min(Math.max(newY, 30), canvas.height - 30);
        }

        function updateEnemy() {
            const dx = player.x - enemy.x;
            if (dx > 0) enemy.lastDir = 'right';
            else if (dx < 0) enemy.lastDir = 'left';
            const dist = Math.hypot(dx, player.y - enemy.y);
            if (dist > 0.01) {
                const move = Math.min(enemy.speed, dist - 5);
                enemy.x += (dx / dist) * move;
                enemy.y += ((player.y - enemy.y) / dist) * move;
            }
            enemy.x = Math.min(Math.max(enemy.x, 30), canvas.width - 30);
            enemy.y = Math.min(Math.max(enemy.y, 30), canvas.height - 30);
        }

        function generateSpikes() {
            const newSpikes = [];
            const spikeRadius = 18;
            for (let i = 0; i < 3; i++) {
                let x, y, safe = false;
                let attempts = 0;
                while (!safe && attempts < 50) {
                    x = Math.random() * (canvas.width - 2 * spikeRadius) + spikeRadius;
                    y = Math.random() * (canvas.height - 2 * spikeRadius) + spikeRadius;
                    if (Math.hypot(x - player.x, y - player.y) > 50 && Math.hypot(x - enemy.x, y - enemy.y) > 50) safe = true;
                    attempts++;
                }
                newSpikes.push({ x, y, radius: spikeRadius });
            }
            spikes = newSpikes;
        }

        function startSpikeGeneration() {
            if (spikeInterval) clearInterval(spikeInterval);
            generateSpikes();
            spikeInterval = setInterval(() => { if (gameRunning && !gameOverFlag) generateSpikes(); }, 2000);
        }
        function stopSpikeGeneration() { if (spikeInterval) { clearInterval(spikeInterval); spikeInterval = null; } }

        function showGameOverAndExitToMenu() {
            const gameOverDiv = document.createElement('div');
            gameOverDiv.className = 'gameover-animation';
            gameOverDiv.textContent = 'ИГРА ОКОНЧЕНА';
            document.body.appendChild(gameOverDiv);
            setTimeout(() => {
                if (gameOverDiv.parentNode) gameOverDiv.parentNode.removeChild(gameOverDiv);
                if (animationId) cancelAnimationFrame(animationId);
                gameRunning = false;
                gameOverFlag = false;
                stopSpikeGeneration();
                stopMusic();
                gameAreaDiv.style.display = 'none';
                mainMenuDiv.style.display = 'flex';
                musicAllowed = false;
            }, 1500);
        }

        function checkCollisions() {
            if (Math.hypot(player.x - enemy.x, player.y - enemy.y) < player.radius + enemy.radius) return true;
            for (let s of spikes) if (Math.hypot(player.x - s.x, player.y - s.y) < player.radius + s.radius) return true;
            return false;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#b7d968';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let s of spikes) {
                ctx.beginPath();
                ctx.moveTo(s.x, s.y - s.radius);
                ctx.lineTo(s.x - s.radius * 0.7, s.y + s.radius * 0.5);
                ctx.lineTo(s.x + s.radius * 0.7, s.y + s.radius * 0.5);
                ctx.fillStyle = '#5a3a1a';
                ctx.fill();
                ctx.fillStyle = '#c97e3a';
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius * 0.6, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#8b4513';
                for (let ang = 0; ang < 6; ang++) {
                    let rad = (ang * 60) * Math.PI / 180;
                    let tipX = s.x + Math.cos(rad) * s.radius * 0.9;
                    let tipY = s.y + Math.sin(rad) * s.radius * 0.9;
                    ctx.beginPath();
                    ctx.moveTo(tipX, tipY);
                    ctx.lineTo(s.x + Math.cos(rad - 0.4) * s.radius * 0.5, s.y + Math.sin(rad - 0.4) * s.radius * 0.5);
                    ctx.lineTo(s.x + Math.cos(rad + 0.4) * s.radius * 0.5, s.y + Math.sin(rad + 0.4) * s.radius * 0.5);
                    ctx.fill();
                }
            }
            if (enemyImg) {
                ctx.save();
                if (enemy.lastDir === 'left') { ctx.scale(-1, 1); ctx.drawImage(enemyImg, -enemy.x - 45, enemy.y - 45, 90, 90); }
                else { ctx.drawImage(enemyImg, enemy.x - 45, enemy.y - 45, 90, 90); }
                ctx.restore();
            }
            if (currentPlayerImg) {
                ctx.save();
                if (player.lastDir === 'left') { ctx.scale(-1, 1); ctx.drawImage(currentPlayerImg, -player.x - 45, player.y - 48, 90, 96); }
                else { ctx.drawImage(currentPlayerImg, player.x - 45, player.y - 48, 90, 96); }
                ctx.restore();
            }
        }

        function updateGameLoop() {
            if (!gameRunning || gameOverFlag) return;
            updatePlayerPosition();
            updateEnemy();
            if (checkCollisions()) {
                gameRunning = false;
                gameOverFlag = true;
                stopSpikeGeneration();
                if (animationId) cancelAnimationFrame(animationId);
                showGameOverAndExitToMenu();
                return;
            }
            draw();
            animationId = requestAnimationFrame(updateGameLoop);
        }

        function resetGame() {
            spikes = [];
            player.x = canvas.width/2;
            player.y = canvas.height/2;
            player.lastDir = 'right';
            enemy.x = 80;
            enemy.y = 80;
            enemy.lastDir = 'right';
            gameOverFlag = false;
            gameRunning = true;
            stopSpikeGeneration();
            setTimeout(() => { if (gameRunning && !gameOverFlag) startSpikeGeneration(); }, 3000);
            if (animationId) cancelAnimationFrame(animationId);
            updateGameLoop();
        }

        async function startGameSession() {
            if (!currentPlayerImg) await updatePlayerSkin();
            if (!enemyImg) enemyImg = await loadEnemy();
            gameAreaDiv.style.display = 'flex';
            mainMenuDiv.style.display = 'none';
            resetGame();
            if (!musicAllowed) { musicAllowed = true; playMusic(); }
            else if (bgMusic && bgMusic.paused) playMusic();
        }

        // Меню скинов
        function openSkinsMenu() {
            let skinsHtml = `<div class="skin-list">`;
            for (let i = 0; i < skinFiles.length; i++) {
                const skin = skinFiles[i];
                const isSelected = (!goldenSkinUnlocked && currentSkinIndex === i);
                skinsHtml += `<div class="skin-option ${isSelected ? 'selected' : ''}" data-skin-index="${i}">
                    <span>${skin.emoji} ${skin.name}</span>
                    <span>${isSelected ? '✓ ВЫБРАН' : 'ВЫБРАТЬ'}</span>
                </div>`;
            }
            if (goldenSkinUnlocked) {
                skinsHtml += `<div class="skin-option selected" data-skin-id="golden">
                    <span>⭐ Golden Cat ⭐</span>
                    <span>✓ ВЫБРАН</span>
                </div>`;
            } else {
                skinsHtml += `<div class="skin-option" style="opacity:0.6;" data-skin-id="golden-locked">
                    <span>⭐ Golden Cat ⭐</span>
                    <span>🔒 ПО ПРОМОКОДУ</span>
                </div>`;
            }
            skinsHtml += `</div><button class="back-btn">◀ НАЗАД</button>`;
            const panel = document.createElement('div');
            panel.className = 'overlay-panel';
            panel.innerHTML = `<div class="panel-card"><h2>ВЫБОР СКИНА</h2>${skinsHtml}</div>`;
            document.body.appendChild(panel);
            
            for (let i = 0; i < skinFiles.length; i++) {
                const opt = panel.querySelector(`.skin-option[data-skin-index="${i}"]`);
                if (opt) {
                    opt.addEventListener('click', async () => {
                        if (goldenSkinUnlocked) {
                            goldenSkinUnlocked = false;
                        }
                        currentSkinIndex = i;
                        await updatePlayerSkin();
                        panel.remove();
                        openSkinsMenu();
                    });
                }
            }
            const goldenOpt = panel.querySelector('.skin-option[data-skin-id="golden"]');
            if (goldenOpt && goldenSkinUnlocked) {
                goldenOpt.addEventListener('click', async () => {
                    currentPlayerImg = goldenSkinImg;
                    goldenSkinUnlocked = true;
                    panel.remove();
                    openSkinsMenu();
                });
            }
            panel.querySelector('.back-btn').onclick = () => panel.remove();
        }

        function openPromoMenu() {
            const panel = document.createElement('div');
            panel.className = 'overlay-panel';
            panel.innerHTML = `<div class="panel-card"><h2>ПРОМОКОДЫ</h2>
                <div class="credit-text"><p>Введите промокод для получения бонуса:</p></div>
                <div class="promo-input">
                    <input type="text" id="promoCode" placeholder="Промокод">
                    <button id="applyPromo">АКТИВИРОВАТЬ</button>
                </div>
                <div id="promoMessage" style="color:#ffaa88; margin-top:0.5rem;"></div>
                <button class="back-btn">◀ НАЗАД</button>
            </div>`;
            document.body.appendChild(panel);
            const applyBtn = panel.querySelector('#applyPromo');
            const promoInput = panel.querySelector('#promoCode');
            const messageDiv = panel.querySelector('#promoMessage');
            applyBtn.onclick = () => {
                const code = promoInput.value.trim().toLowerCase();
                if (code === '22golden22') {
                    if (!goldenSkinUnlocked) {
                        goldenSkinUnlocked = true;
                        currentPlayerImg = goldenSkinImg;
                        messageDiv.innerHTML = '✅ Промокод активирован! Золотой скин разблокирован!';
                        messageDiv.style.color = '#aaffaa';
                    } else {
                        messageDiv.innerHTML = '✨ Золотой скин уже разблокирован!';
                        messageDiv.style.color = '#ffaa88';
                    }
                } else if (code !== '') {
                    messageDiv.innerHTML = '❌ Неверный промокод';
                    messageDiv.style.color = '#ff8888';
                }
            };
            panel.querySelector('.back-btn').onclick = () => panel.remove();
        }

        // обработчики
        document.getElementById('playBtn').onclick = async () => { await startGameSession(); };
        document.getElementById('skinsBtn').onclick = () => { openSkinsMenu(); };
        document.getElementById('promoBtn').onclick = () => { openPromoMenu(); };
        document.getElementById('creditsBtn').onclick = () => {
            const panel = document.createElement('div');
            panel.className = 'overlay-panel';
            panel.innerHTML = `<div class="panel-card"><h2>CREDITS</h2><div class="credit-text"><p>🎮 игра создана <strong>Hleb Game</strong> и <strong>KotKotkin</strong></p><p>🐾 за спрайты котов — спасибо команде <strong>Scratch</strong></p><p>🎵 smart tachka - Angry Cat (Original Soundtrack)</p></div><button class="back-btn">◀ НАЗАД</button></div>`;
            document.body.appendChild(panel);
            panel.querySelector('.back-btn').onclick = () => panel.remove();
        };

        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        
        // Загружаем все скины и запускаем
        loadAllSkins().then(() => {
            console.log('All skins loaded');
            updatePlayerSkin();
        });
        
        document.body.addEventListener('click', () => { if (!musicAllowed && bgMusic) { musicAllowed = true; playMusic(); } }, { once: true });
    })();
</script>
